name: Auto-merge

# Realizes the auto-merge policy from docs/delivery-playbook.md.
# Enables PR auto-merge (squash) on every PR. Once enabled, GitHub
# completes the merge as soon as required checks pass and required
# reviews are satisfied. Branch protection on master is what actually
# gates the merge — this workflow just opts in.
#
# Policy change 2026-04-29: dropped the `auto-merge-ok` + `claude-cd`
# label gate. The owner does not want approval to be required for
# routine work; CI green is sufficient.

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ github.event.pull_request.number }}
          merge-method: squash
