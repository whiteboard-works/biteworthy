name: CI · API

on:
  push:
    branches: [master, main]
  pull_request:
    paths:
      - "apps/api/**"
      - ".github/workflows/ci-api.yml"

concurrency:
  group: ci-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rspec:
    name: rspec · brakeman · rubocop
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/api
    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/biteworthy_test
      DATABASE_HOST: localhost
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres

    steps:
      - uses: actions/checkout@v4

      # Phase 4.11.1 — Ingestion::DishPhotoCropper depends on
      # MiniMagick which shells out to `magick`/`identify`. The
      # ubuntu-latest runner ships ImageMagick today but be explicit
      # so a future runner image change doesn't silently break us.
      - name: Install ImageMagick
        run: sudo apt-get update -y && sudo apt-get install -y imagemagick

      - uses: ruby/setup-ruby@v1
        with:
          working-directory: apps/api
          bundler-cache: true

      - name: bundle env
        run: bundle env

      - name: db:create
        run: bin/rails db:create

      - name: db:schema:load
        run: bin/rails db:schema:load

      - name: which rspec
        run: bundle exec ruby -e 'puts Gem.bin_path("rspec-core","rspec")'

      - name: RSpec
        run: bin/rspec

      - name: Brakeman
        run: bundle exec brakeman --no-pager --quiet --format plain
        continue-on-error: true

      - name: Rubocop
        run: bundle exec rubocop --parallel
        continue-on-error: true
