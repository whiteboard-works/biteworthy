# Seed ingredient taxonomy. Tiny starter set — full ~1500-row port from
# _legacy/db/seeds/0_ingredients.rb happens in a later migration once we've
# nailed the path conventions and decided which 2020 entries to keep.
#
# `allergen: true` flags ingredients that are "big-9" allergens for the
# strict-mode honest-disclosure UI.

# --- Roots ---
- slug: ingredient
  name: Ingredient
  path: ingredient
- slug: animal
  name: Animal product
  path: ingredient.animal
- slug: plant
  name: Plant
  path: ingredient.plant
- slug: dairy
  name: Dairy
  path: ingredient.animal.dairy
  allergen: true
- slug: meat
  name: Meat
  path: ingredient.animal.meat
