default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DATABASE_HOST") { "localhost" } %>
  username: <%= ENV.fetch("DATABASE_USERNAME") { "postgres" } %>
  password: <%= ENV.fetch("DATABASE_PASSWORD") { "" } %>

development:
  primary:
    <<: *default
    database: biteworthy_dev
  cache:
    <<: *default
    database: biteworthy_dev_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: biteworthy_dev_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: biteworthy_dev_cable
    migrations_paths: db/cable_migrate

test:
  <<: *default
  database: biteworthy_test

production:
  primary: &prod_primary
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
  cache:
    <<: *prod_primary
    database: biteworthy_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *prod_primary
    database: biteworthy_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *prod_primary
    database: biteworthy_production_cable
    migrations_paths: db/cable_migrate
